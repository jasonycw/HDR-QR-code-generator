<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDR QR Code Generator</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-sizing: border-box;
        }

        h1 {
            margin: 0 0 20px 0;
            font-size: 22px;
            color: #1a1a1a;
            font-weight: 700;
        }

        #qr-input {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            margin-bottom: 25px;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        #qr-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
            outline: none;
        }

        /* --- THE MASKED PREVIEW STYLES --- */
        .qr-preview-container {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 0 auto;
            background: #eee;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .qr-preview-container:hover {
            transform: scale(1.02);
        }

        #bg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        #mask-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            mix-blend-mode: multiply;
            /* This makes white transparent, keeping black */
            pointer-events: none;
            image-rendering: pixelated;
        }

        .hint {
            margin-top: 15px;
            font-size: 13px;
            color: #64748b;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>HDR QR Generator</h1>
        <input type="text" id="qr-input" placeholder="Paste URL here..." spellcheck="false" />

        <div class="qr-preview-container" id="qr-result-box" title="Click to view full HDR version">
            <!-- Background Image -->
            <img id="bg-layer" src="https://jasonycw.github.io/screen-tests/HDR/white/background.jpg" alt="Background">
            <!-- The Generated QR Code Mask -->
            <img id="mask-layer" alt="QR Mask">
        </div>

        <p class="hint">Click the QR code to open the HDR viewer</p>
    </div>

    <script>
        // ======================================================================
        // INLINE PURE JS QR CODE GENERATOR (Restored & Fixed)
        // ======================================================================
        var qrcode = (function () {

            q.prototype = {

                isDark: function (a, b) { if (0 > a || this.moduleCount <= a || 0 > b || this.moduleCount <= b) throw Error(a + "," + b); return this.modules[a][b] },
                getModuleCount: function () { return this.moduleCount },
                make: function () {

                            for (e = 0; e < this.dataList.length; e++)b = this.dataList[e], c.put(b.mode, 4), c.put(b.getLength(), w.getLengthInBits(b.mode, a)), b.write(c);

                makeImpl: function (a, b) {

                getBestMaskPattern: function () {
                    for (var a = 0, b = 0, c = 0; 8 > c; c++) { this.makeImpl(!0, c); var d = x.getLostPoint(this); if (0 == c || a > d) a = d, b = c } return b

                setupTimingPattern: function () {
                    for (var a = 8; a < this.moduleCount - 8; a++)null == this.modules[a][6] && (this.modules[a][6] = 0 == a % 2);

                },
                setupPositionAdjustPattern: function () {
                    for (var a = x.getPatternPosition(this.typeNumber), b = 0; b < a.length; b++)for (var c = 0; c < a.length; c++) { var d = a[b], e = a[c]; if (null == this.modules[d][e]) for (var f = -2; 2 >= f; f++)for (var g = -2; 2 >= g; g++)this.modules[d + f][e + g] = -2 == f || 2 == f || -2 == g || 2 == g || 0 == f && 0 == g ? !0 : !1 }
                },
                setupTypeNumber: function (a) {
                    for (var b = x.getBCHTypeNumber(this.typeNumber), c = 0; 18 > c; c++) { var d = !a && 1 == (b >> c & 1); this.modules[Math.floor(c / 3)][c % 3 + this.moduleCount - 8 - 3] = d }
                    for (c = 0; 18 > c; c++)d = !a && 1 == (b >> c & 1), this.modules[c % 3 + this.moduleCount - 8 - 3][Math.floor(c / 3)] = d
                },
                setupTypeInfo: function (a, b) {
                    for (var c = this.errorCorrectLevel << 3 | b, d = x.getBCHTypeInfo(c), e = 0; 15 > e; e++) { var f = !a && 1 == (d >> e & 1); 6 > e ? this.modules[e][8] = f : 8 > e ? this.modules[e + 1][8] = f : this.modules[this.moduleCount - 15 + e][8] = f }

                },
                mapData: function (a, b) {
                    for (var c = -1, d = this.moduleCount - 1, e = 7, f = 0, g = this.moduleCount - 1; 0 < g; g -= 2) {
                        6 == g && g--;
                        for (; ;) {
                            for (var k = 0; 2 > k; k++)if (null == this.modules[d][g - k]) { var l = !1; f < a.length && (l = 1 == (a[f] >>> e & 1)); x.getMask(b, d, g - k) && (l = !l); this.modules[d][g - k] = l; e--; -1 == e && (f++, e = 7) }
                            d += c; if (0 > d || this.moduleCount <= d) { d -= c; c = -c; break }
                        }
                    }
                }
            };
            q.PAD0 = 236; q.PAD1 = 17;
            q.createData = function (a, b, c) {
                for (var b = r.getRSBlocks(a, b), d = new t, e = 0; e < c.length; e++) { var f = c[e]; d.put(f.mode, 4); d.put(f.getLength(), w.getLengthInBits(f.mode, a)); f.write(d) }
                for (e = a = 0; e < b.length; e++)a += b[e].dataCount;
                for (d.getLengthInBits() + 4 <= 8 * a && d.put(0, 4); 0 != d.getLengthInBits() % 8;)d.putBit(!1);
                for (; !(d.getLengthInBits() >= 8 * a);) { d.put(q.PAD0, 8); if (d.getLengthInBits() >= 8 * a) break; d.put(q.PAD1, 8) }
                return q.createBytes(d, b)
            };
            q.createBytes = function (buffer, blocks) {
                var offset = 0, maxData = 0, maxEc = 0, dataBlocks = Array(blocks.length), ecBlocks = Array(blocks.length);
                for (var k = 0; k < blocks.length; k++) {
                    var dc = blocks[k].dataCount, ec = blocks[k].totalCount - dc;
                    maxData = Math.max(maxData, dc); maxEc = Math.max(maxEc, ec);
                    dataBlocks[k] = Array(dc);
                    for (var p = 0; p < dataBlocks[k].length; p++) dataBlocks[k][p] = 255 & buffer.buffer[p + offset];
                    offset += dc;
                    var poly = x.getErrorCorrectPolynomial(ec);
                    var polyMod = new u(dataBlocks[k], poly.getLength() - 1);
                    polyMod = polyMod.mod(poly);
                    ecBlocks[k] = Array(poly.getLength() - 1);
                    for (var l = 0; l < ecBlocks[k].length; l++) {
                        var mIdx = l + polyMod.getLength() - ecBlocks[k].length;
                        ecBlocks[k][l] = 0 <= mIdx ? polyMod.get(mIdx) : 0;
                    }
                }
                var total = 0;
                for (var k = 0; k < blocks.length; k++) total += blocks[k].totalCount;
                var res = Array(total), idx = 0;
                for (var k = 0; k < maxData; k++) for (var l = 0; l < blocks.length; l++) if (k < dataBlocks[l].length) res[idx++] = dataBlocks[l][k];
                for (var k = 0; k < maxEc; k++) for (var l = 0; l < blocks.length; l++) if (k < ecBlocks[l].length) res[idx++] = ecBlocks[l][k];

            };
            var v = { glog: function (a) { if (1 > a) throw Error("glog(" + a + ")"); return v.LOG_TABLE[a] }, gexp: function (a) { for (; 0 > a;)a += 255; for (; 256 <= a;)a -= 255; return v.EXP_TABLE[a] }, EXP_TABLE: Array(256), LOG_TABLE: Array(256) };
            for (var C = 0; 8 > C; C++)v.EXP_TABLE[C] = 1 << C;
            for (C = 8; 256 > C; C++)v.EXP_TABLE[C] = v.EXP_TABLE[C - 4] ^ v.EXP_TABLE[C - 5] ^ v.EXP_TABLE[C - 6] ^ v.EXP_TABLE[C - 8];
            for (C = 0; 255 > C; C++)v.LOG_TABLE[v.EXP_TABLE[C]] = C;
            var w = { MODE_NUMBER: 1 << 0, MODE_ALPHA_NUM: 1 << 1, MODE_8BIT_BYTE: 1 << 2, MODE_KANJI: 1 << 3, getLengthInBits: function (a, b) { if (1 <= b && 9 >= b) switch (a) { case w.MODE_NUMBER: return 10; case w.MODE_ALPHA_NUM: return 9; case w.MODE_8BIT_BYTE: return 8; default: return 8 } else if (10 <= b && 26 >= b) switch (a) { case w.MODE_NUMBER: return 12; case w.MODE_ALPHA_NUM: return 11; case w.MODE_8BIT_BYTE: return 16; default: return 10 } else switch (a) { case w.MODE_NUMBER: return 14; case w.MODE_ALPHA_NUM: return 13; case w.MODE_8BIT_BYTE: return 16; default: return 12 } } };
            var t = function () { this.buffer = []; this.length = 0 };
            t.prototype = { get: function (a) { return 1 == (this.buffer[Math.floor(a / 8)] >>> 7 - a % 8 & 1) }, put: function (a, b) { for (var c = 0; c < b; c++)this.putBit(1 == (a >>> b - c - 1 & 1)) }, getLengthInBits: function () { return this.length }, putBit: function (a) { var b = Math.floor(this.length / 8); this.buffer.length <= b && this.buffer.push(0); a && (this.buffer[b] |= 128 >>> this.length % 8); this.length++ } };
            var r = function (a) { this.mode = w.MODE_8BIT_BYTE; this.data = a };
            r.prototype = { getLength: function () { return encodeURIComponent(this.data).replace(/%[A-F\d]{2}/g, "U").length }, write: function (a) { for (var b = encodeURIComponent(this.data).replace(/%([A-F\d]{2})/g, function (a, b) { return String.fromCharCode(parseInt(b, 16)) }), c = 0; c < b.length; c++)a.put(b.charCodeAt(c), 8) } };
            r.getRSBlocks = function (a, b) {
                var c = r.getRsBlockTable(a, b);
                for (var d = c.length / 3, e = [], f = 0; f < d; f++)for (var g = c[3 * f + 0], k = c[3 * f + 1], l = c[3 * f + 2], m = 0; m < g; m++)e.push(new B(k, l));
                return e
            };
            r.getRsBlockTable = function (a, b) {
                var tables = {
                    1: [[1, 26, 19], [1, 44, 34], [1, 70, 55], [1, 100, 80], [1, 134, 108], [2, 86, 68], [2, 98, 78], [2, 121, 97], [2, 146, 116], [2, 171, 135]],
                    0: [[1, 26, 16], [1, 44, 28], [1, 70, 44], [2, 50, 32], [2, 67, 43], [4, 43, 27], [4, 49, 31], [2, 60, 38, 2, 61, 39], [3, 58, 36, 2, 59, 37], [4, 69, 43, 1, 70, 44]],
                    3: [[1, 26, 13], [1, 44, 22], [2, 35, 17], [2, 50, 24], [2, 33, 15, 2, 34, 16], [4, 43, 19], [2, 32, 14, 4, 33, 15], [4, 40, 18, 2, 41, 19], [4, 36, 16, 4, 37, 17], [6, 43, 19, 2, 44, 20]],
                    2: [[1, 26, 9], [1, 44, 16], [2, 35, 13], [4, 25, 9], [2, 33, 11, 2, 34, 12], [4, 43, 15], [4, 39, 13, 1, 40, 14], [4, 40, 14, 2, 41, 15], [4, 36, 12, 4, 37, 13], [6, 43, 15, 2, 44, 16]]

            };
            var u = function (a, b) { for (var c = 0; c < a.length && 0 == a[c];)c++; this.num = Array(a.length - c + b); for (var d = 0; d < a.length - c; d++)this.num[d] = a[d + c] };
            u.prototype = {
                get: function (a) { return this.num[a] },
                getLength: function () { return this.num.length },
                multiply: function (a) {
                    for (var b = Array(this.getLength() + a.getLength() - 1), c = 0; c < b.length; c++)b[c] = 0;
                    for (var c = 0; c < this.getLength(); c++)for (var d = 0; d < a.getLength(); d++)b[c + d] ^= v.gexp(v.glog(this.get(c)) + v.glog(a.get(d)));

                mod: function (a) {

        // ======================================================================
        // APP LOGIC
        // ======================================================================
        document.addEventListener("DOMContentLoaded", () => {
            const input = document.getElementById('qr-input');
            const maskImg = document.getElementById('mask-layer');
            const box = document.getElementById('qr-result-box');
            let currentBase64 = '';

            // Default Value
            input.value = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";

            const updateMask = (text) => {
                if (!text) {
                    maskImg.style.display = 'none';
                    currentBase64 = '';
                    return;
                }

                try {
                    // Error Correction L (1) is usually best for "artistic" QRs as it's less dense
                    const qr = qrcode(0, 1);
                    qr.addData(text);
                    qr.make();

                    const count = qr.getModuleCount();
                    const cellSize = 10;
                    const margin = 4;
                    const size = (count + margin * 2) * cellSize;

                    const canvas = document.createElement('canvas');
                    canvas.width = size;
                    canvas.height = size;
                    const ctx = canvas.getContext('2d');

                    // Draw white background
                    ctx.fillStyle = '#FFFFFF';
                    ctx.fillRect(0, 0, size, size);

                    // Draw black modules
                    ctx.fillStyle = '#000000';
                    for (let row = 0; row < count; row++) {
                        for (let col = 0; col < count; col++) {
                            if (qr.isDark(row, col)) {
                                ctx.fillRect((col + margin) * cellSize, (row + margin) * cellSize, cellSize, cellSize);
                            }
                        }
                    }

                    currentBase64 = canvas.toDataURL('image/png');
                    maskImg.src = currentBase64;
                    maskImg.style.display = 'block';
                } catch (e) {
                    console.error(e);
                    maskImg.style.display = 'none';
                }
            };

            // Initial Gen
            updateMask(input.value);

            // Listen for typing
            input.addEventListener('input', (e) => updateMask(e.target.value));

            // Redirect on click
            box.addEventListener('click', () => {
                if (currentBase64) {
                    const encodedData = encodeURIComponent(currentBase64);
                    const target = `http://jasonycw.github.io/screen-tests/HDR/white/QR-code?base64=${encodedData}`;
                    window.open(target, '_blank');
                }
            });
        });
    </script>
</body>

</html>
